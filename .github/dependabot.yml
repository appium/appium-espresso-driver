version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "11:00"
  open-pull-requests-limit: 10
  commit-message:
    prefix: "chore"
    include: "scope"
# Gradle: Dependabot updates gradle/libs.versions.toml ([libraries], [plugins], and shared [versions]).
- package-ecosystem: "gradle"
  directory: "/espresso-server"
  schedule:
    interval: daily
    time: "11:00"
  open-pull-requests-limit: 10
  commit-message:
    prefix: "chore"
    include: "scope"
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: daily
    time: "11:00"
  open-pull-requests-limit: 10
  commit-message:
    prefix: "ci"
    include: "scope"
